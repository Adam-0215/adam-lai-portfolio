<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Longboard Speed Guesser</title>
    <style>
        body {
            font-family: 'Verdana', sans-serif;
            background-color: #333333;
            color: #333333;
            text-align: center;
            padding-top: 50px;
        }
        .game-box {
            background-color: #ffffff;
            max-width: 500px;
            margin: 0 auto;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0px 10px 20px rgba(0,0,0,0.5);
            border: 4px solid #cccccc;
        }
        h1 {
            color: #d9534f;
        }
        input[type="number"] {
            padding: 10px;
            font-size: 18px;
            width: 150px;
            text-align: center;
            margin: 15px 0;
            border: 2px solid #333;
            border-radius: 5px;
        }
        button {
            padding: 10px 20px;
            font-size: 18px;
            background-color: #5cb85c;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #4cae4c;
        }
        #feedback {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
            height: 30px;
        }
        .attempts {
            margin-top: 10px;
            font-size: 14px;
            color: #777;
        }
        .back-link {
            display: inline-block;
            margin-top: 30px;
            color: #007bff;
            text-decoration: none;
            font-weight: bold;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="game-box">
        <h1>Downhill Speed Radar</h1>
        <p>I just bombed a massive hill on my longboard.<br>Can you guess my top speed?</p>
        <p><em>(Hint: It is a number between 1 and 60 mph)</em></p>

        <input type="number" id="guessInput" placeholder="Enter Speed" min="1" max="60">
        <br>
        <button onclick="checkGuess()">Submit Guess</button>

        <div id="feedback"></div>
        <div class="attempts" id="attemptCount">Guesses so far: 0</div>

        <a href="scratch.html" class="back-link">← Back to My Scratch Page</a>
    </div>

    <script>
        // AI GENERATED JAVASCRIPT GAME LOGIC
        // Generate a random number between 1 and 60
        let targetSpeed = Math.floor(Math.random() * 60) + 1;
        let guesses = 0;

        function checkGuess() {
            let userGuess = document.getElementById("guessInput").value;
            let feedbackText = document.getElementById("feedback");
            let attemptText = document.getElementById("attemptCount");

            if (userGuess === "" || userGuess < 1 || userGuess > 60) {
                feedbackText.style.color = "red";
                feedbackText.innerHTML = "Please enter a valid number between 1 and 60!";
                return;
            }

            guesses++;
            attemptText.innerHTML = "Guesses so far: " + guesses;

            if (userGuess == targetSpeed) {
                feedbackText.style.color = "green";
                feedbackText.innerHTML = "🎯 BULLSEYE! You guessed it in " + guesses + " tries!";
            } else if (userGuess > targetSpeed) {
                feedbackText.style.color = "orange";
                feedbackText.innerHTML = "Too high! I wasn't going quite that fast.";
            } else {
                feedbackText.style.color = "blue";
                feedbackText.innerHTML = "Too low! I was going faster than that.";
            }
        }
    </script>

</body>
</html>
